# Stack QA local AISLADO para validación manual con Chrome DevTools MCP.
#
# No comparte proyecto, volúmenes ni puertos con el entorno dev manual (medicopilot-dev /
# platform-core-dev) ni con e2e. Levantar siempre con el nombre de proyecto explícito:
#
#   docker compose -p platform-core-qa -f compose.qa.yml up -d --build
#   docker compose -p platform-core-qa -f compose.qa.yml run --rm migrate
#   docker compose -p platform-core-qa -f compose.qa.yml down -v   # limpieza total
#
# Entrada del navegador QA: http://localhost:3300  ·  Mailpit QA: http://localhost:8325
# Base vacía y reproducible: el administrador se crea por el flujo HTTP de Bootstrap
# (/ -> /setup), nunca con BOOTSTRAP_ADMIN_* ni SQL directo.
name: platform-core-qa

x-backend-environment: &backend-environment
  ENVIRONMENT: local
  SECRET_KEY: qa-secret-key-change-me
  # El origen confiable es el de la entrada nginx (cookies de sesión / CSRF).
  TRUSTED_BROWSER_ORIGINS: http://localhost:3300
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  EMAIL_TOKEN_EXPIRE_MINUTES: "30"
  TRYS_BEFORE_LOCK: "5"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_USER: qa@example.com
  SMTP_PASSWORD: qa-password
  SMTP_FROM_EMAIL: qa@example.com
  SMTP_FROM_NAME: MedicoPilot QA
  SMTP_TLS: "false"
  SMTP_SSL: "false"
  SMTP_USE_CREDENTIALS: "false"
  POSTGRES_USER: medicopilot
  POSTGRES_PASSWORD: medicopilot
  POSTGRES_SERVER: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: medicopilot_qa
  # Límites generosos para no interferir con los flujos manuales del navegador QA.
  RATE_LIMIT_LOGIN_IP: "100/900"
  RATE_LIMIT_LOGIN_IDENTITY: "100/900"
  RATE_LIMIT_BOOTSTRAP_IP: "100/900"

services:
  redis:
    image: redis:7-alpine
    volumes:
      - qa_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 12

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medicopilot
      POSTGRES_PASSWORD: medicopilot
      POSTGRES_DB: medicopilot_qa
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 12

  # La migración usa la MISMA imagen recién construida que el backend QA (no una imagen
  # horneada antigua): el backend no arranca hasta que termina con éxito.
  migrate:
    build:
      context: ./backend
      target: prod
    image: medicopilot-backend:qa
    environment:
      <<: *backend-environment
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: prod
    image: medicopilot-backend:qa
    environment:
      <<: *backend-environment
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      target: prod
    image: medicopilot-frontend:qa
    environment:
      API_PROXY_TARGET: http://backend:8000
      BACKEND_INTERNAL_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3300:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  mailpit:
    image: axllent/mailpit:latest
    expose:
      - "1025"
    ports:
      - "127.0.0.1:8325:8025"

volumes:
  qa_redis_data:
  qa_postgres_data:
