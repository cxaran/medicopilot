# Stack QA local AISLADO para validación manual con Chrome DevTools MCP.
#
# No comparte proyecto, volúmenes ni puertos con el entorno dev manual (medicopilot-dev /
# platform-core-dev) ni con e2e. Levantar siempre con el nombre de proyecto explícito:
#
#   docker compose -p platform-core-qa -f compose.qa.yml up -d --build
#   docker compose -p platform-core-qa -f compose.qa.yml run --rm migrate
#   docker compose -p platform-core-qa -f compose.qa.yml down -v   # limpieza total
#
# Entrada del navegador QA: http://localhost:3300  ·  Mailpit QA: http://localhost:8325
# Base vacía y reproducible: el administrador se crea por el flujo HTTP de Bootstrap
# (/ -> /setup), nunca con BOOTSTRAP_ADMIN_* ni SQL directo.
name: platform-core-qa

x-backend-environment: &backend-environment
  ENVIRONMENT: local
  SECRET_KEY: qa-secret-key-change-me
  # El origen confiable es el de la entrada nginx (cookies de sesión / CSRF).
  TRUSTED_BROWSER_ORIGINS: http://localhost:3300
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  EMAIL_TOKEN_EXPIRE_MINUTES: "30"
  TRYS_BEFORE_LOCK: "5"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_USER: qa@example.com
  SMTP_PASSWORD: qa-password
  SMTP_FROM_EMAIL: qa@example.com
  SMTP_FROM_NAME: MedicoPilot QA
  SMTP_TLS: "false"
  SMTP_SSL: "false"
  SMTP_USE_CREDENTIALS: "false"
  # Clave Fernet DEDICADA (QA-only) para cifrar en reposo las credenciales de proveedor
  # de IA (B3/B10). Sin ella, el alta de API key responde 500. El flujo OAuth de ChatGPT
  # se deja SIN configurar a propósito (sin OPENAI_OAUTH_*) para validar la ruta "no
  # disponible" (503) sin credenciales reales.
  AI_CREDENTIAL_KEY: 28xZin-IsJd7cWkJZFtFum3N6c-2zjtONYJ9I144pp0=
  # Secretos compartidos con el model-gateway (B14a). Valores DUMMY de QA (no producción);
  # el ticket y el internal DEBEN coincidir con los del servicio model-gateway de abajo.
  AGENT_GATEWAY_TICKET_SECRET: qa-agent-ticket-secret-shared-dummy
  AGENT_GATEWAY_INTERNAL_SECRET: qa-internal-lease-secret-shared-dummy
  POSTGRES_USER: medicopilot
  POSTGRES_PASSWORD: medicopilot
  POSTGRES_SERVER: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: medicopilot_qa
  # Límites generosos para no interferir con los flujos manuales del navegador QA.
  RATE_LIMIT_LOGIN_IP: "100/900"
  RATE_LIMIT_LOGIN_IDENTITY: "100/900"
  RATE_LIMIT_BOOTSTRAP_IP: "100/900"

services:
  redis:
    image: redis:7-alpine
    volumes:
      - qa_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 12

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medicopilot
      POSTGRES_PASSWORD: medicopilot
      POSTGRES_DB: medicopilot_qa
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 12

  # La migración usa la MISMA imagen recién construida que el backend QA (no una imagen
  # horneada antigua): el backend no arranca hasta que termina con éxito.
  migrate:
    build:
      context: ./backend
      target: prod
    image: medicopilot-backend:qa
    environment:
      <<: *backend-environment
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: prod
    image: medicopilot-backend:qa
    environment:
      <<: *backend-environment
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # model-gateway (B14a): runtime de inferencia. Verifica el ticket JWT del backend y
  # arrienda credenciales por el puente interno; sus secretos DEBEN coincidir con los del
  # backend QA. Sin credencial de proveedor real solo responde catálogo (models.list).
  model-gateway:
    build:
      context: ./model-gateway
    image: medicopilot-gateway:qa
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "8081"
      GATEWAY_PUBLIC_PATH_PREFIX: /model-gateway
      GATEWAY_ENABLE_ROOT_PATH_ALIAS: "true"
      # El navegador llega por nginx en http://localhost:3300 (origen de las peticiones).
      GATEWAY_ALLOWED_ORIGINS: http://localhost:3300
      # Mismos valores que el backend QA (verificación de ticket y arriendo interno).
      GATEWAY_AGENT_TICKET_SECRET: qa-agent-ticket-secret-shared-dummy
      GATEWAY_BACKEND_INTERNAL_URL: http://backend:8000
      GATEWAY_BACKEND_INTERNAL_SECRET: qa-internal-lease-secret-shared-dummy
      # Base de opencode zen (OpenAI-compatible). La key de prueba es de OpenCode Go
      # (suscripcion), no de Zen: Zen la rechaza. El e2e usa el proveedor opencode_go.
      GATEWAY_OPENCODE_BASE_URL: https://opencode.ai/zen/v1
      GATEWAY_OPENCODE_DEFAULT_MODEL: claude-haiku-4-5
      # OpenCode Go habilitado: la MISMA key opencode arrendada se usa contra el endpoint
      # Go con provider id opencode_go. qwen3.7-plus pertenece al bundle Go y soporta tools.
      GATEWAY_OPENCODE_GO_ENABLED: "true"
      GATEWAY_OPENCODE_GO_BASE_URL: https://opencode.ai/zen/go/v1
      GATEWAY_OPENCODE_GO_DEFAULT_MODEL: qwen3.7-plus
    expose:
      - "8081"
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        # URL pública del gateway vía nginx (mismo origen que el frontend QA). Se inyecta
        # en build (NEXT_PUBLIC_*) para que el copiloto conecte en QA.
        NEXT_PUBLIC_AGENT_GATEWAY_URL: http://localhost:3300/model-gateway
    image: medicopilot-frontend:qa
    environment:
      API_PROXY_TARGET: http://backend:8000
      BACKEND_INTERNAL_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3300:80"
    volumes:
      # Config QA propia (añade la ruta /model-gateway/ con WS); el dev manual no se toca.
      - ./nginx/nginx.qa.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - model-gateway

  mailpit:
    image: axllent/mailpit:latest
    expose:
      - "1025"
    ports:
      - "127.0.0.1:8325:8025"

volumes:
  qa_redis_data:
  qa_postgres_data:
