name: medicopilot-dev

x-backend-environment: &backend-environment
  ENVIRONMENT: local
  SECRET_KEY: dev-secret-key-change-me
  TRUSTED_BROWSER_ORIGINS: http://localhost:3000
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  EMAIL_TOKEN_EXPIRE_MINUTES: "30"
  TRYS_BEFORE_LOCK: "5"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  SMTP_HOST: mailpit
  SMTP_PORT: "1025"
  SMTP_USER: dev@example.com
  SMTP_PASSWORD: dev-password
  SMTP_FROM_EMAIL: dev@example.com
  SMTP_FROM_NAME: MedicoPilot Dev
  SMTP_TLS: "false"
  SMTP_SSL: "false"
  SMTP_USE_CREDENTIALS: "false"
  # Secretos compartidos con el model-gateway (B14a). Valores DUMMY de dev (no producción);
  # el ticket y el internal DEBEN coincidir con los del servicio model-gateway de abajo.
  AGENT_GATEWAY_TICKET_SECRET: dev-agent-ticket-secret-shared
  AGENT_GATEWAY_INTERNAL_SECRET: dev-internal-lease-secret-shared
  POSTGRES_USER: medicopilot
  POSTGRES_PASSWORD: medicopilot
  POSTGRES_SERVER: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: medicopilot

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medicopilot
      POSTGRES_PASSWORD: medicopilot
      POSTGRES_DB: medicopilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: dev
    image: medicopilot-backend:dev
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    expose:
      - "1025"
    restart: unless-stopped

  migrate:
    image: medicopilot-backend:dev
    profiles: [ "migrate" ]
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      <<: *backend-environment
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # model-gateway (B14a): runtime de inferencia con recarga en caliente (tsx watch).
  # Verifica el ticket del backend y arrienda credenciales por el puente interno; sus
  # secretos DEBEN coincidir con los del backend de arriba. Sin credencial de proveedor
  # real solo responde catálogo (models.list). No publica puerto: el navegador llega por
  # nginx en el mismo origen del frontend (/model-gateway), para que la cookie de sesión
  # del gateway y el WebSocket funcionen sin fricción cross-origin.
  model-gateway:
    build:
      context: ./model-gateway
      target: dev
    image: medicopilot-gateway:dev
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: "8081"
      GATEWAY_PUBLIC_PATH_PREFIX: /model-gateway
      GATEWAY_ENABLE_ROOT_PATH_ALIAS: "true"
      # El navegador llega por nginx en http://localhost:3000 (origen de las peticiones).
      GATEWAY_ALLOWED_ORIGINS: http://localhost:3000
      # Mismos valores que el backend (verificación de ticket y arriendo interno).
      GATEWAY_AGENT_TICKET_SECRET: dev-agent-ticket-secret-shared
      GATEWAY_BACKEND_INTERNAL_URL: http://backend:8000
      GATEWAY_BACKEND_INTERNAL_SECRET: dev-internal-lease-secret-shared
      # opencode zen (OpenAI-compatible) + OpenCode Go (suscripción) habilitado: la misma
      # key opencode arrendada sirve contra el endpoint Go con provider id opencode_go.
      GATEWAY_OPENCODE_BASE_URL: https://opencode.ai/zen/v1
      GATEWAY_OPENCODE_DEFAULT_MODEL: claude-haiku-4-5
      GATEWAY_OPENCODE_GO_ENABLED: "true"
      GATEWAY_OPENCODE_GO_BASE_URL: https://opencode.ai/zen/go/v1
      GATEWAY_OPENCODE_GO_DEFAULT_MODEL: qwen3.7-plus
      # OpenAI API key (provider id "openai", chat_completions contra api.openai.com). Apagado
      # por defecto: enciéndelo solo si agregas una API key de OpenAI en /account (si no, saldría
      # un modelo "fantasma" curado que no se puede usar). Discovery /models en vivo cuando hay key.
      GATEWAY_OPENAI_ENABLED: "false"
      GATEWAY_OPENAI_BASE_URL: https://api.openai.com/v1
      GATEWAY_OPENAI_DEFAULT_MODEL: gpt-4o-mini
      # Codex / suscripción ChatGPT (OAuth) — provider id PROPIO "openai_codex", INDEPENDIENTE de
      # la API key (ambos pueden coexistir). Responses contra chatgpt.com/backend-api/codex con el
      # access token OAuth + header chatgpt-account-id. Discovery EN VIVO de los slugs (gpt-5.5,
      # gpt-5.4, …) vía /models?client_version. Requiere conectar ChatGPT por OAuth en /account.
      GATEWAY_OPENAI_CODEX_ENABLED: "true"
      GATEWAY_OPENAI_CODEX_BASE_URL: https://chatgpt.com/backend-api/codex
      GATEWAY_OPENAI_CODEX_DEFAULT_MODEL: gpt-5.5
      GATEWAY_OPENAI_CODEX_CLIENT_VERSION: "1.0.0"
    volumes:
      - ./model-gateway:/app
      - gateway_node_modules:/app/node_modules
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      target: dev
    image: medicopilot-frontend:dev
    environment:
      API_PROXY_TARGET: http://backend:8000
      BACKEND_INTERNAL_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
      # URL pública del gateway por el MISMO origen que el frontend (vía nginx). Next la
      # lee en dev desde el entorno; habilita la conexión del copiloto. Asume puerto 3000.
      NEXT_PUBLIC_AGENT_GATEWAY_URL: http://localhost:3000/model-gateway
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

  # Entrada única del stack dev: unifica frontend, backend y model-gateway en un solo
  # origen (http://localhost:3000) con upgrade de WebSocket. Imprescindible para que el
  # copiloto conecte al gateway en el mismo origen del frontend.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - model-gateway
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  frontend_node_modules:
  frontend_next:
  gateway_node_modules:
