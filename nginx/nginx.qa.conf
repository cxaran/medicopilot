# Entrada nginx del stack QA AISLADO (B14a). Igual que nginx.conf pero añade la ruta
# del model-gateway (/model-gateway/) con upgrade de WebSocket, para validar el tubo
# completo del agente (ticket -> browser-session -> WS -> models.list) en QA. No se usa
# en el dev manual ni en el compose principal (esos siguen con nginx.conf).
server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # model-gateway: el prefijo público del gateway es /model-gateway, así que se reenvía
    # el URI sin reescribir. Incluye upgrade de WebSocket para /model-gateway/v1/ws.
    location /model-gateway/ {
        proxy_pass http://model-gateway:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
