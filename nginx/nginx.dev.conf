# Entrada nginx del stack DEV manual (compose.dev.yml). Entrada única en un solo origen
# (http://localhost:3000) para que el copiloto conecte al model-gateway por el MISMO
# origen que el frontend: así la cookie de sesión del gateway y el upgrade de WebSocket
# funcionan sin problemas cross-origin. Detrás siguen corriendo backend, frontend y
# model-gateway con recarga en caliente. Equivalente a nginx.qa.conf.
server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # model-gateway: su prefijo público es /model-gateway, se reenvía el URI sin reescribir.
    # Incluye upgrade de WebSocket para /model-gateway/v1/ws.
    location /model-gateway/ {
        proxy_pass http://model-gateway:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Frontend Next.js en modo dev. El upgrade de WebSocket también es necesario para el
    # Hot Module Reload (HMR) de Next durante el desarrollo.
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Callback del OAuth de ChatGPT (cliente Codex suplantado): su redirect_uri
# REGISTRADO en OpenAI es http://localhost:1455/auth/callback (loopback del CLI,
# no modificable). Este listener recibe ese aterrizaje en la máquina del médico y
# lo reenvía —con code y state intactos— al callback real de la app, eliminando
# el paso de pegar la URL a mano. Sólo aplica cuando el navegador corre en la
# misma máquina que el stack (el caso self-hosted local).
server {
    listen 1455;

    location /auth/callback {
        return 302 http://localhost:3000/account/oauth/callback$is_args$args;
    }

    location / {
        return 404;
    }
}
