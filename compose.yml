name: medicopilot

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Base de datos del stack (despliegue self-hosted autocontenido). Si usas una DB
  # gestionada externa, apunta POSTGRES_SERVER del .env a ella y retira este
  # servicio (y las dependencias postgres de abajo).
  postgres:
    image: postgres:16-alpine
    env_file: ${APP_ENV_FILE:-.env}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medicopilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD en el .env}
      POSTGRES_DB: ${POSTGRES_DB:-medicopilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: prod
    image: medicopilot-backend:prod
    # El archivo de entorno debe definir TRUSTED_BROWSER_ORIGINS con los orígenes
    # HTTPS públicos confiables; en producción la app falla al iniciar si está vacío.
    env_file: ${APP_ENV_FILE:-.env}
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    image: medicopilot-frontend:prod
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  migrate:
    image: medicopilot-backend:prod
    profiles: [ "migrate" ]
    env_file: ${APP_ENV_FILE:-.env}
    command: [ "alembic", "-c", "backend/alembic.ini", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy

  # Tareas en segundo plano (Taskiq sobre PostgreSQL): worker y scheduler en procesos
  # PROPIOS con profile explícito "taskiq"; `docker compose up` normal no los levanta.
  # Con TASKIQ_SCHEDULE_ENABLED=false (el default) arrancan sin ejecutar nada
  # programado. UNA sola réplica del scheduler.
  taskiq-worker:
    image: medicopilot-backend:prod
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    command: [ "taskiq", "worker", "backend.app.taskiq_app:broker", "--workers", "1", "--max-async-tasks", "1" ]
    # El primer arranque puede chocar con el scheduler creando la tabla del broker a la
    # vez (UniqueViolation en pg_type); el reinicio lo absorbe.
    restart: unless-stopped

  taskiq-scheduler:
    image: medicopilot-backend:prod
    profiles: [ "taskiq" ]
    env_file: ${APP_ENV_FILE:-.env}
    command: [ "taskiq", "scheduler", "backend.app.taskiq_app:scheduler", "--skip-first-run" ]
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
